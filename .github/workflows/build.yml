name: Build Dalib r-v0.0.0+1.21.11

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ver_r: "r-v0.0.0+1.21.11"
  ver_a: "a-v0.0.0+1.21.11"
  ver_b: "b-v0.0.0+1.21.11"
  tag_r: "0.0.0+1.21.11+r.1"
  tag_a: "0.0.0+1.21.11+a.1"
  tag_b: "0.0.0+1.21.11+b.3"
  java_ver: "25"
  lib: "dalib"

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip]') }}

    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: validate
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5.3.0
        with:
          distribution: 'temurin'
          java-version: ${{ env.java_ver }}

      - name: gradlew exe & build
        run: |
          chmod +x ./gradlew
          ./gradlew build

      - name: capture artifacts
        uses: actions/upload-artifact@v7
        with:
          name: jars
          path: build/libs

  publish:
    if: ${{ contains(github.event.head_commit.message, '[pub]') }}

    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: validate
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5.3.0
        with:
          distribution: 'temurin'
          java-version: ${{ env.java_ver }}

      - name: gradlew exe & build
        run: |
          chmod +x ./gradlew
          ./gradlew publish

      - name: push
        run: |
          git clone https://x-access-token:${{ secrets.MAVEN_TOKEN }}@github.com/TheUnknownMaven/maven.git site
          cp -r build/repo/* site/
          cd site
          git config user.name "devonk15"
          git config user.email "94760159+devonk15@users.noreply.github.com"
          git add .
          git commit -m "publishing ${{ env.lib }}" || echo "Nothing to commit"
          git push
          
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip]') }}

    permissions:
      contents: write

    needs: [ build ]

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download Files
        uses: actions/download-artifact@v8
        with:
          path: jars
          merge-multiple: true

      - name: release - r
        if: ${{ !contains(github.event.head_commit.message, '[a]') || !contains(github.event.head_commit.message, '[b]')}}
        uses: softprops/action-gh-release@v3
        with:
          name: Dalib ${{ env.ver_r }}
          tag_name: ${{ env.tag_r }}
          body_path: ${{ github.workspace }}/changelog.md
          draft: true
          generate_release_notes: true
          files: |
            jars/*.jar

      - name: release - a
        if: ${{ contains(github.event.head_commit.message, '[a]') && !contains(github.event.head_commit.message, '[b]')}}
        uses: softprops/action-gh-release@v3
        with:
          name: Dalib ${{ env.ver_a }}
          tag_name: ${{ env.tag_a }}
          body_path: ${{ github.workspace }}/changelog.md
          draft: true
          generate_release_notes: true
          files: |
            jars/*.jar

      - name: release - b
        if: ${{ contains(github.event.head_commit.message, '[b]') && !contains(github.event.head_commit.message, '[a]')}}
        uses: softprops/action-gh-release@v3
        with:
          name: Dalib ${{ env.ver_b }}
          tag_name: ${{ env.tag_b }}
          body_path: ${{ github.workspace }}/changelog.md
          draft: true
          generate_release_notes: true
          files: |
            jars/*.jar